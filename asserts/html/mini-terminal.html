<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你角色卡 - 黑客帝国风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Courier New', 'Fira Code', monospace;
        }

        .terminal {
            background: #0c0c0c;
            border: 1px solid #1a3a1a;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            overflow: hidden;
        }

        .terminal-bar {
            background: #0a0a0a;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #1a3a1a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .terminal-title {
            color: #3a6e3a;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        .content {
            padding: 1.2rem;
        }

        .command-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid #1a3a1a;
            padding-bottom: 0.6rem;
            margin-bottom: 1rem;
        }

        .prompt { color: #00ff41; }
        .command { color: #6aff7a; }

        .level-badge {
            margin-left: auto;
            background: #1a3a1a;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font-size: 0.65rem;
            color: #00ff41;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .avatar { font-size: 2.5rem; }
        .name { color: #00ff41; font-weight: bold; font-size: 1rem; }
        .title { color: #6aff7a; font-size: 0.6rem; }

        .exp-section {
            margin-bottom: 1rem;
        }

        .exp-header {
            display: flex;
            justify-content: space-between;
            color: #6aff7a;
            font-size: 0.6rem;
            margin-bottom: 0.3rem;
        }

        .ascii-bar {
            color: #00ff41;
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
            font-family: monospace;
        }

        .graph-bar {
            background: #1a1a1a;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }

        .graph-fill {
            background: #00ff41;
            width: 0%;
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .skills-section {
            margin-bottom: 1rem;
        }

        .skills-title {
            color: #00ff41;
            font-size: 0.6rem;
            margin-bottom: 0.4rem;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
        }

        .skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-name {
            color: #6aff7a;
            font-size: 0.6rem;
        }

        .skill-level {
            color: #00ff41;
            font-size: 0.6rem;
        }

        .skill-bar-small {
            background: #1a1a1a;
            border-radius: 3px;
            height: 4px;
            width: 60px;
            overflow: hidden;
            margin-left: 0.5rem;
        }

        .skill-bar-small-fill {
            background: #00ff41;
            width: 0%;
            height: 100%;
            border-radius: 3px;
        }

        .achievements-section {
            margin-bottom: 1rem;
        }

        .achievements-title {
            color: #00ff41;
            font-size: 0.6rem;
            margin-bottom: 0.4rem;
        }

        .achievement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0;
            border-bottom: 1px solid #1a3a1a;
        }

        .achievement-item:last-child {
            border-bottom: none;
        }

        .achievement-name {
            color: #6aff7a;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .achievement-date {
            color: #3a6e3a;
            font-size: 0.55rem;
        }

        .achievement-xp {
            color: #00ff41;
            font-size: 0.55rem;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-top: 1px solid #1a3a1a;
            padding-top: 0.6rem;
        }

        .quote {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .quote-text {
            color: #3a6e3a;
            font-size: 0.6rem;
        }

        .cursor {
            width: 6px;
            height: 12px;
            background: #00ff41;
            animation: blink 1s step-end infinite;
        }

        .link {
            background: #1a3a1a;
            color: #00ff41;
            text-decoration: none;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.6rem;
            border: 1px solid #00ff41;
            transition: all 0.2s;
        }

        .link:hover {
            background: #00ff41;
            color: #0a0a0a;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-bar">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
            <div class="terminal-title">ethicalpaws@security-lab:~/profile</div>
        </div>
        <div class="content">
            <div class="command-line">
                <span class="prompt">$></span>
                <span class="command">cat profile</span>
                <span class="level-badge" id="level-badge">Lv.?</span>
            </div>

            <div class="user-info">
                <div class="avatar">🐕</div>
                <div>
                    <div class="name" id="name">ethicalpaws</div>
                    <div class="title" id="title">VULN_HUNTER</div>
                </div>
            </div>

            <div class="exp-section">
                <div class="exp-header">
                    <span>XP PROGRESS</span>
                    <span><span id="exp-current">0</span> / <span id="exp-next">200</span></span>
                </div>
                <div class="ascii-bar" id="ascii-bar">[░░░░░░░░░░░░░░░░░░░░] 0%</div>
                <div class="graph-bar">
                    <div class="graph-fill" id="exp-fill"></div>
                </div>
            </div>

            <div class="skills-section">
                <div class="skills-title">> SKILL MATRIX</div>
                <div class="skills-grid" id="skills-grid">
                    <div class="skill-item">
                        <span class="skill-name">WEB_SECURITY</span>
                        <div style="display: flex; align-items: center;">
                            <span class="skill-level" id="web-level">Lv.0</span>
                            <div class="skill-bar-small"><div class="skill-bar-small-fill" id="web-fill"></div></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">JAVA_SECURITY</span>
                        <div style="display: flex; align-items: center;">
                            <span class="skill-level" id="java-level">Lv.0</span>
                            <div class="skill-bar-small"><div class="skill-bar-small-fill" id="java-fill"></div></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">CTF_ABILITY</span>
                        <div style="display: flex; align-items: center;">
                            <span class="skill-level" id="ctf-level">Lv.0</span>
                            <div class="skill-bar-small"><div class="skill-bar-small-fill" id="ctf-fill"></div></div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <span class="skill-name">CVE_ANALYSIS</span>
                        <div style="display: flex; align-items: center;">
                            <span class="skill-level" id="cve-level">Lv.0</span>
                            <div class="skill-bar-small"><div class="skill-bar-small-fill" id="cve-fill"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="achievements-section">
                <div class="achievements-title">> ACHIEVEMENTS</div>
                <div id="achievements-list">
                    <div class="achievement-item">
                        <div class="achievement-name">[!] 加载中...</div>
                        <div class="achievement-xp"></div>
                    </div>
                </div>
            </div>

            <div class="footer">
                <div class="quote">
                    <span class="prompt">$></span>
                    <span class="quote-text" id="quote">加载中...</span>
                    <div class="cursor"></div>
                </div>
                <a href="/role-panel/" class="link">🔍 完整档案</a>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // 加载角色数据
                const res = await fetch('/data/character.json');
                const data = await res.json();
                const auto = data.auto;
                const manual = data.manual;

                // 计算经验百分比
                const expPercent = (auto.current_exp / auto.next_exp * 100).toFixed(1);

                // 更新基本信息
                document.getElementById('name').textContent = manual.name || 'ethicalpaws';
                document.getElementById('title').textContent = manual.title || 'VULN_HUNTER';
                document.getElementById('level-badge').textContent = `Lv.${auto.level}`;
                document.getElementById('exp-current').textContent = auto.current_exp;
                document.getElementById('exp-next').textContent = auto.next_exp;

                // 更新进度条
                const barLen = 20;
                const filled = Math.floor(expPercent / 100 * barLen);
                const asciiBar = '█'.repeat(filled) + '░'.repeat(barLen - filled);
                document.getElementById('ascii-bar').innerHTML = `[${asciiBar}] ${expPercent}%`;
                document.getElementById('exp-fill').style.width = expPercent + '%';

                // 更新技能
                const skills = auto.skills || {};
                const webLevel = skills.web_security || 0;
                const javaLevel = skills.java_security || 0;
                const ctfLevel = skills.ctf_ability || 0;
                const cveLevel = skills.cve_analysis || 0;

                document.getElementById('web-level').textContent = `Lv.${webLevel}`;
                document.getElementById('java-level').textContent = `Lv.${javaLevel}`;
                document.getElementById('ctf-level').textContent = `Lv.${ctfLevel}`;
                document.getElementById('cve-level').textContent = `Lv.${cveLevel}`;

                document.getElementById('web-fill').style.width = (webLevel / 20 * 100) + '%';
                document.getElementById('java-fill').style.width = (javaLevel / 20 * 100) + '%';
                document.getElementById('ctf-fill').style.width = (ctfLevel / 20 * 100) + '%';
                document.getElementById('cve-fill').style.width = (cveLevel / 20 * 100) + '%';

                // 成就
                const achievements = manual.special_achievements || [];
                if (achievements.length > 0) {
                    document.getElementById('achievements-list').innerHTML = achievements.map(ach => `
                        <div class="achievement-item">
                            <div class="achievement-name">
                                <span>[🏆]</span>
                                <span>${ach}</span>
                            </div>
                            <div class="achievement-xp">✨</div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('achievements-list').innerHTML = `
                        <div class="achievement-item">
                            <div class="achievement-name">[!] 暂无成就，继续努力！</div>
                            <div class="achievement-xp"></div>
                        </div>
                    `;
                }

                // 加载语录
                const quotesRes = await fetch('/data/quotes.json');
                const quotesData = await quotesRes.json();
                const tips = quotesData.weekly_tips || ['Flag 出来的那一刻，值了'];
                const randomTip = tips[Math.floor(Math.random() * tips.length)];
                document.getElementById('quote').textContent = randomTip.replace(/[💡🌟]/g, '').trim();

            } catch(e) {
                console.error('加载失败:', e);
                document.getElementById('quote').textContent = 'Flag 出来的那一刻，值了';
                document.getElementById('level-badge').textContent = 'Lv.1';
            }
        }
        loadData();
    </script>
</body>
</html>
