<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色面板 - 黑客帝国风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 2rem;
        }

        /* 主容器 */
        .terminal-panel {
            max-width: 520px;
            width: 100%;
            background: #0c0c0c;
            border: 1px solid #1a3a1a;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            overflow: hidden;
        }

        /* 终端头部 */
        .terminal-header {
            background: #0a0a0a;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1a3a1a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2a2a2a;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .terminal-title {
            color: #3a6e3a;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        /* 内容区域 */
        .terminal-content {
            padding: 1.5rem;
        }

        /* 命令行样式 */
        .command-line {
            color: #00ff41;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .prompt {
            color: #00ff41;
        }

        .command {
            color: #a7f0a7;
        }

        /* 进度条容器 */
        .progress-section {
            background: #0f0f0f;
            border: 1px solid #1a3a1a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .level-bar {
            background: #1a1a1a;
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .level-fill {
            background: linear-gradient(90deg, #00ff41, #00cc33);
            width: 0%;
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease-out;
            box-shadow: 0 0 8px #00ff41;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            color: #a7f0a7;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        /* 技能列表 */
        .skills-section {
            background: #0f0f0f;
            border: 1px solid #1a3a1a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            color: #00ff41;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            letter-spacing: 1px;
        }

        .skill-item {
            margin-bottom: 0.75rem;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            color: #a7f0a7;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .skill-bar {
            background: #1a1a1a;
            border-radius: 3px;
            height: 12px;
            overflow: hidden;
        }

        .skill-fill {
            background: #00ff41;
            width: 0%;
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease-out;
        }

        /* 成就列表 */
        .achievements-section {
            background: #0f0f0f;
            border: 1px solid #1a3a1a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .achievement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #1a3a1a;
            color: #a7f0a7;
            font-size: 0.75rem;
        }

        .achievement-item:last-child {
            border-bottom: none;
        }

        .achievement-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .achievement-xp {
            color: #00ff41;
        }

        /* 语录 */
        .quote-section {
            background: #0f0f0f;
            border-left: 3px solid #00ff41;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            color: #a7f0a7;
            font-size: 0.8rem;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #3a6e3a;
        }
    </style>
</head>
<body>
    <div class="terminal-panel" id="role-panel">
        <div class="terminal-header">
            <div class="terminal-dot red"></div>
            <div class="terminal-dot yellow"></div>
            <div class="terminal-dot green"></div>
            <div class="terminal-title">ethicalpaws@security-lab:~/profile</div>
        </div>
        <div class="terminal-content" id="content">
            <div class="loading">$> loading profile... <span class="cursor"></span></div>
        </div>
    </div>

    <script>
        // 角色数据
        const characterData = {
            name: "ethicalpaws",
            title: "漏洞猎人",
            motto: "路漫漫其修远兮",
            level: 15,
            exp: 2450,
            exp_to_next: 5000,
            skills: {
                web_security: { level: 8, exp: 800, max: 20 },
                java_security: { level: 4, exp: 400, max: 20 },
                ctf_ability: { level: 6, exp: 600, max: 20 },
                cve_analysis: { level: 4, exp: 400, max: 20 }
            },
            achievements: [
                { name: "🎯 初露锋芒", desc: "挖到第一个漏洞", date: "2025-05-20", xp: 100 },
                { name: "☕ Java骑士", desc: "完成Java反序列化", date: "2025-05-15", xp: 200 },
                { name: "🏴 CTF新兵", desc: "第一次参加CTF", date: "2025-05-10", xp: 150 }
            ],
            quote: "Flag 出来的那一刻，值了"
        };

        // 计算百分比
        const expPercent = (characterData.exp / characterData.exp_to_next * 100).toFixed(1);
        characterData.expPercent = expPercent;

        for (let key in characterData.skills) {
            characterData.skills[key].percent = (characterData.skills[key].level / characterData.skills[key].max * 100).toFixed(1);
        }

        // 生成HTML
        function renderPanel() {
            const skillsHtml = Object.entries(characterData.skills).map(([key, skill]) => {
                const nameMap = {
                    web_security: "WEB_SECURITY",
                    java_security: "JAVA_SECURITY",
                    ctf_ability: "CTF_ABILITY",
                    cve_analysis: "CVE_ANALYSIS"
                };
                return `
                    <div class="skill-item">
                        <div class="skill-header">
                            <span>├─ ${nameMap[key]}</span>
                            <span>Lv.${skill.level}</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" data-width="${skill.percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            const achievementsHtml = characterData.achievements.map(ach => `
                <div class="achievement-item">
                    <div class="achievement-name">
                        <span>[!]</span>
                        <span>${ach.name}</span>
                        <span style="color: #3a6e3a;">${ach.date}</span>
                    </div>
                    <div class="achievement-xp">+${ach.xp} XP</div>
                </div>
            `).join('');

            return `
                <div class="command-line">
                    <span class="prompt">$></span>
                    <span class="command">cat profile</span>
                </div>

                <div class="progress-section">
                    <div class="stat-row">
                        <span>[${'█'.repeat(Math.floor(characterData.expPercent / 5))}${'░'.repeat(20 - Math.floor(characterData.expPercent / 5))}]</span>
                        <span>Lv.${characterData.level}</span>
                    </div>
                    <div class="level-bar">
                        <div class="level-fill" data-width="${characterData.expPercent}%"></div>
                    </div>
                    <div class="stat-row">
                        <span>> XP: ${characterData.exp} / ${characterData.exp_to_next}</span>
                        <span>> Title: ${characterData.title}</span>
                    </div>
                </div>

                <div class="skills-section">
                    <div class="section-title">> SKILLS</div>
                    ${skillsHtml}
                </div>

                <div class="achievements-section">
                    <div class="section-title">> ACHIEVEMENTS (${characterData.achievements.length})</div>
                    ${achievementsHtml}
                </div>

                <div class="quote-section">
                    <span>$></span> ${characterData.quote}
                    <span class="cursor"></span>
                </div>
            `;
        }

        // 动画效果
        function startAnimations() {
            const fills = document.querySelectorAll('[data-width]');
            fills.forEach(fill => {
                const width = fill.getAttribute('data-width');
                setTimeout(() => {
                    fill.style.width = width;
                }, 100);
            });
        }

        // 加载面板
        const container = document.getElementById('content');
        container.innerHTML = renderPanel();
        setTimeout(startAnimations, 100);
    </script>
</body>
</html>
