  title: "🔰 基础知识"
  description: "编程语言、操作系统、WAF绕过等基础"
  module_tag_mapping:
    bypass-waf:
      - bypass
      - waf
      - 绕过
      - waf-bypass
  learning_route:
    - "**编程基础**：Python、JavaScript、Java"
    - "**操作系统**：Linux、Windows基础"
    - "**WAF绕过**：基础绕过技巧"
