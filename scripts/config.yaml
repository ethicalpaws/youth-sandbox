# ==================== 03-web-basics 章节 ====================
web_basics:
  title: "🌐 Web基础漏洞"
  description: "OWASP Top 10 核心漏洞，Web安全入门必学"
  status_to_chapter:
    持续更新中: "♻️"
    进行中: "🔄"
    未开始: "⬜"
  
  module_tag_mapping:
    xss:
      - xss
      - XSS
      - cross-site-scripting
    sqli:
      - sqli
      - sql-injection
      - SQL注入
    csrf:
      - csrf
      - CSRF
      - xsrf
    ssrf:
      - ssrf
      - SSRF
    xxe:
      - xxe
      - XXE
    command-injection:
      - command-injection
      - command injection
      - cmdi
      - 命令注入
    file-upload:
      - file-upload
      - file upload
      - upload
      - 文件上传
    access-control:
      - access-control
      - access control
      - 越权
      - 权限绕过
    info-leak:
      - info-leak
      - info leak
      - information-disclosure
      - 信息泄露
  
  learning_route:
    - "**基础三剑客**：XSS → CSRF → SQL注入"
    - "**服务端漏洞**：SSRF → XXE → 命令注入"
    - "**权限与文件**：文件上传 → 访问控制 → 信息泄露"
  
  resources:
    - name: "OWASP Top 10"
      url: "https://owasp.org/Top10/"
      purpose: "漏洞权威列表"
    - name: "PortSwigger"
      url: "https://portswigger.net/web-security"
      purpose: "在线实战"
    - name: "BugKu CTF"
      url: "https://ctf.bugku.com/"
      purpose: "CTF练习"
  
  milestones:
    - count: 3
      icon: "🎖️"
      title: "Web安全基础入门"
    - count: 6
      icon: "🏅"
      title: "Web安全基础进阶"
    - count: 9
      icon: "🏆"
      title: "Web安全基础精通"

