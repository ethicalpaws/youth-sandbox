# 站点信息
site_name: 青春沙盒
site_description: 安全学习笔记 × 青春记录 | 一个可以安全试错的环境
site_author: ethicalpaws
site_url: https://ethicalpaws.github.io/youth-sandbox/
copyright: © 2026 青春沙盒 - 记录技术，也记录青春

# 主题配置
theme:
  name: material
  custom_dir: overrides  # 自定义模板目录
  palette:
    # 亮色模式
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 暗色模式
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  
  features:
    - navigation.tabs          # 顶部标签页
    - navigation.sections      # 侧边栏分组
    - navigation.expand        # 自动展开
    - navigation.top           # 返回顶部
    - navigation.indexes       # 章节索引
    - navigation.tracking      # URL锚点跟踪
    - search.suggest           # 搜索建议
    - search.highlight         # 搜索高亮
    - search.share             # 搜索分享
    - content.code.copy        # 代码复制
    - content.code.annotate    # 代码注释
    - toc.follow               # 目录跟随滚动
  
  icon:
    repo: fontawesome/brands/github
    logo: material/cloud

# 仓库信息（显示在右上角）
repo_url: https://github.com/ethicalpaws/youth-sandbox
repo_name: youth-sandbox
edit_uri: blob/main/docs/

# 全局 CSS
extra_css:
  - assets/css/extra.css
  - assets/css/home.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css
  - asserts/css/hacker-theme.css      # 新增：黑客帝国风格
# 全局 JS（会加载到所有页面）
extra_javascript:
  - assets/js/extra.js
  - assets/js/encryption.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - asserts/js/hacker-theme.js        # 新增：黑客帝国特效

# 如果有需要延迟加载或条件加载的 JS
# 可以在具体页面的 Markdown 中用 <script> 标签


# 插件配置 
plugins:
  - search
  - blog:
      blog_dir: updates
      post_date_format: long
      post_url_format: "{date}/{slug}"
      post_excerpt_separator: "<!-- more -->"
      pagination_per_page: 10
      pagination_url_format: "page/{page}"
      archive: true
      archive_name: "📦 全部动态"
      categories: true
      categories_name: "📂 分类"
      categories_allowed:
        - "🎉 成就时刻"
        - "🔧 技术突破"
        - "💭 日常感悟"
        - "📖 学习周报"
        - "💪 奋斗记录"
      authors: true
      authors_profiles: true
      generate_rss: true
      rss_url: "feed_rss.xml"
      post_readtime: true
      post_readtime_words_per_minute: 265
      post_navigation: true

 

  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      enable_git_follow: false   # 修复警告

# Markdown扩展
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - footnotes

